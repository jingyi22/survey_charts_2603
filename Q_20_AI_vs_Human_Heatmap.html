<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #fff;
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    padding: 14px;
  }
  .page {
    width: 672px;
    background: #fff;
    padding: 11px 14px 8px;
  }

  .heatmap-wrap { overflow: hidden; }
  table { border-collapse: collapse; width: 100%; table-layout: fixed; }

  /* Column headers */
  thead th { padding: 0; }
  .th-type {
    background: #fff; width: 30px;
    border-bottom: 2px solid #d1d5db;
  }
  .th-region {
    background: #fff; width: 32px;
    border-bottom: 2px solid #d1d5db;
    border-left: 1px solid #e5e7eb;
  }
  .th-sc {
    background: #fff; color: #374151;
    font-size: 8.5px; font-weight: 600;
    text-align: center; vertical-align: bottom;
    padding: 7px 3px 8px;
    line-height: 1.4;
    border-left: 1px solid #e5e7eb;
    border-bottom: 2px solid #d1d5db;
  }
  .th-sc .sc-abbr { display: block; color: #1f2937; }
  .th-sc .sc-full { display: none; }

  /* Response type label (vertical, rowspan=6) */
  .type-cell {
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    text-align: center;
    font-size: 11px; font-weight: 700;
    white-space: nowrap;
    padding: 6px 4px;
    border-right: 1px solid rgba(255,255,255,0.4);
  }
  .type-ai  { color: #1e40af; background: #dbeafe; border-top: 2px solid #bfdbfe; border-bottom: 2px solid #bfdbfe; }
  .type-ei  { color: #92400e; background: #fef3c7; border-top: 2px solid #fde68a; border-bottom: 2px solid #fde68a; }
  .type-hu  { color: #9f1239; background: #ffe4e6; border-top: 2px solid #fecdd3; border-bottom: 2px solid #fecdd3; }

  /* Region label */
  .region-cell {
    padding: 0 4px;
    font-size: 8.5px; font-weight: 700;
    text-align: center;
    color: #374151;
    border-right: 1px solid #e5e7eb;
    border-left: 1px solid #e5e7eb;
    vertical-align: middle;
    background: #f9fafb;
  }

  /* Data cells */
  td.cell {
    text-align: center; vertical-align: middle;
    padding: 8px 3px;
    border-left: 1px solid rgba(255,255,255,0.3);
    cursor: default;
  }
  .cell-pct { font-size: 11.5px; font-weight: 700; display: block; }
  .cell-cnt { font-size: 7px; display: block; margin-top: 1px; opacity: 0.68; }

  /* Group separators */
  tr.group-sep td, tr.group-sep th { border-top: 2px solid #d1d5db !important; }

  /* Legend + footnote */
  .legend { display: flex; gap: 14px; margin-top: 7px; align-items: center; flex-wrap: wrap; }
  .legend-group { display: flex; align-items: center; gap: 5px; font-size: 8px; color: #374151; }
  .legend-bar { width: 46px; height: 8px; border-radius: 2px; }
  .lb-ai { background: linear-gradient(to right, #dbeafe, #1d4ed8); }
  .lb-ei { background: linear-gradient(to right, #fef9c3, #d97706); }
  .lb-hu { background: linear-gradient(to right, #ffe4e6, #e11d48); }
  .legend-label { font-size: 6.5px; color: #9ca3af; margin-left: 2px; }

  .footnote { font-size: 7px; color: #9ca3af; margin-top: 5px; }
  .footnote b { color: #6b7280; }
</style>
</head>
<body>
<div class="page">
  <div class="heatmap-wrap">
    <table id="htable"></table>
  </div>

  <div class="legend">
    <span style="font-size:10px;font-weight:700;color:#374151;">Color Scale (0% → 100%):</span>
    <div class="legend-group"><div class="legend-bar lb-ai"></div>Prefer AI <span class="legend-label">Low → High</span></div>
    <div class="legend-group"><div class="legend-bar lb-ei"></div>Either <span class="legend-label">Low → High</span></div>
    <div class="legend-group"><div class="legend-bar lb-hu"></div>Prefer Human Agent <span class="legend-label">Low → High</span></div>
  </div>
  <p class="footnote">
    <b>Total N = 1,076</b> &nbsp;|&nbsp; Each cell: <b>%</b> share (n = count) &nbsp;|&nbsp;
    GB=140 · HK=325 · SG=100 · TH=67 · JP=299 · KR=145
  </p>
</div>

<script>
const scenarios = [
  { abbr: "Pre-Booking\nInquiries",        full: "flight/hotel info, price comparison" },
  { abbr: "Booking\nProcess Issues",       full: "payment, seat selection" },
  { abbr: "Order\nConfirmation",           full: "order status, info verification" },
  { abbr: "Mid-Trip\nRequests",            full: "changes, cancellations, add services" },
  { abbr: "Pre-Trip\nPreparation",         full: "visa tips, itinerary tips" },
  { abbr: "Urgent\nTrip Issues",           full: "flight delays, hotel check-in" },
  { abbr: "Post-Trip\nIssues",             full: "refunds, complaints" },
  { abbr: "Complaints &\nService Quality", full: "service quality issues" }
];

const typeLabels = ['Prefer AI', 'Either', 'Prefer Human Agent'];
const typeCls    = ['type-ai', 'type-ei', 'type-hu'];

// Bright vivid color ranges: [from, to] for each response type
// AI: pale blue → vivid blue
// Either: pale amber → vivid amber
// Human: pale rose → vivid rose
const colorRanges = [
  [[219,234,254],[29,78,216]],   // AI: #dbeafe → #1d4ed8
  [[254,249,195],[217,119,6]],   // Either: #fef9c3 → #d97706
  [[255,228,230],[225,29,72]]    // Human: #ffe4e6 → #e11d48
];

const regions = ['GB','HK','SG','TH','JP','KR'];
const regionN  = {GB:140, HK:325, SG:100, TH:67, JP:299, KR:145};

// data[region][scenarioIdx] = [[aiPct,aiCnt],[eitherPct,eitherCnt],[humanPct,humanCnt]]
const data = {
  GB: [
    [[35.0,49],[28.6,40],[36.4,51]],
    [[15.7,22],[25.0,35],[59.3,83]],
    [[34.3,48],[34.3,48],[31.4,44]],
    [[8.6,12],[27.1,38],[64.3,90]],
    [[35.7,50],[30.7,43],[33.6,47]],
    [[7.1,10],[10.7,15],[82.1,115]],
    [[10.7,15],[27.9,39],[61.4,86]],
    [[7.1,10],[16.4,23],[76.4,107]]
  ],
  HK: [
    [[23.1,75],[46.8,152],[30.2,98]],
    [[12.9,42],[37.2,121],[49.8,162]],
    [[20.3,66],[47.1,153],[32.6,106]],
    [[4.0,13],[26.5,86],[69.5,226]],
    [[25.8,84],[47.7,155],[26.5,86]],
    [[0.9,3],[14.8,48],[84.3,274]],
    [[2.8,9],[20.0,65],[77.2,251]],
    [[3.4,11],[20.6,67],[76.0,247]]
  ],
  SG: [
    [[34.0,34],[39.0,39],[27.0,27]],
    [[14.0,14],[32.0,32],[54.0,54]],
    [[32.0,32],[40.0,40],[28.0,28]],
    [[6.0,6],[26.0,26],[68.0,68]],
    [[37.0,37],[40.0,40],[23.0,23]],
    [[3.0,3],[13.0,13],[84.0,84]],
    [[10.0,10],[28.0,28],[62.0,62]],
    [[4.0,4],[20.0,20],[76.0,76]]
  ],
  TH: [
    [[50.7,34],[34.3,23],[14.9,10]],
    [[19.4,13],[19.4,13],[61.2,41]],
    [[44.8,30],[32.8,22],[22.4,15]],
    [[19.4,13],[23.9,16],[56.7,38]],
    [[59.7,40],[23.9,16],[16.4,11]],
    [[11.9,8],[13.4,9],[74.6,50]],
    [[13.4,9],[16.4,11],[70.1,47]],
    [[19.4,13],[22.4,15],[58.2,39]]
  ],
  JP: [
    [[40.5,121],[37.1,111],[22.4,67]],
    [[28.4,85],[32.8,98],[38.8,116]],
    [[38.5,115],[32.8,98],[28.8,86]],
    [[17.4,52],[23.1,69],[59.5,178]],
    [[43.5,130],[40.1,120],[16.4,49]],
    [[4.7,14],[12.4,37],[82.9,248]],
    [[8.4,25],[18.4,55],[73.2,219]],
    [[10.0,30],[24.7,74],[65.2,195]]
  ],
  KR: [
    [[30.3,44],[29.7,43],[40.0,58]],
    [[15.9,23],[33.1,48],[51.0,74]],
    [[29.0,42],[34.5,50],[36.6,53]],
    [[9.7,14],[19.3,28],[71.0,103]],
    [[37.9,55],[31.7,46],[30.3,44]],
    [[5.5,8],[13.8,20],[80.7,117]],
    [[4.1,6],[17.2,25],[78.6,114]],
    [[7.6,11],[14.5,21],[77.9,113]]
  ]
};

function cellBg(pct, ti) {
  const t = Math.min(pct, 100) / 100;
  const [lo, hi] = colorRanges[ti];
  return `rgb(${Math.round(lo[0]+(hi[0]-lo[0])*t)},${Math.round(lo[1]+(hi[1]-lo[1])*t)},${Math.round(lo[2]+(hi[2]-lo[2])*t)})`;
}
function fg(pct)    { return pct >= 50 ? '#ffffff' : '#111827'; }
function fgSub(pct) { return pct >= 50 ? 'rgba(255,255,255,0.72)' : 'rgba(0,0,0,0.42)'; }

const table = document.getElementById('htable');

// ── Header ─────────────────────────────────────────────────────────────────
const thead = document.createElement('thead');
const hrow  = document.createElement('tr');

const thType = document.createElement('th');
thType.className = 'th-type';
hrow.appendChild(thType);

const thRegion = document.createElement('th');
thRegion.className = 'th-region';
thRegion.style.cssText = 'font-size:7.5px;color:#9ca3af;font-weight:600;text-align:center;vertical-align:bottom;padding:0 0 8px;';
thRegion.textContent = 'Rgn';
hrow.appendChild(thRegion);

scenarios.forEach(sc => {
  const th = document.createElement('th');
  th.className = 'th-sc';
  th.title = sc.full;
  const [a, b] = sc.abbr.split('\n');
  th.innerHTML = `<span class="sc-abbr">${a}</span><span class="sc-abbr">${b||''}</span><span class="sc-full">${sc.full}</span>`;
  hrow.appendChild(th);
});
thead.appendChild(hrow);
table.appendChild(thead);

// ── Body ───────────────────────────────────────────────────────────────────
const tbody = document.createElement('tbody');

[0, 1, 2].forEach(ti => {
  regions.forEach((region, ri) => {
    const tr = document.createElement('tr');
    if (ri === 0) tr.classList.add('group-sep');

    // Type cell (rowspan=6, only first region)
    if (ri === 0) {
      const tdType = document.createElement('td');
      tdType.className = `type-cell ${typeCls[ti]}`;
      tdType.rowSpan = regions.length;
      tdType.textContent = typeLabels[ti];
      tr.appendChild(tdType);
    }

    // Region cell
    const tdRegion = document.createElement('td');
    tdRegion.className = 'region-cell';
    tdRegion.textContent = region;
    // last row of each group gets thicker bottom border
    if (ri === regions.length - 1) tdRegion.style.borderBottom = '2px solid #d1d5db';
    tr.appendChild(tdRegion);

    // Data cells
    data[region].forEach((scData, si) => {
      const [pct, cnt] = scData[ti];
      const td = document.createElement('td');
      td.className = 'cell';
      td.style.background = cellBg(pct, ti);
      if (ri === regions.length - 1) td.style.borderBottom = '2px solid #d1d5db';
      td.innerHTML = `<span class="cell-pct" style="color:${fg(pct)}">${pct.toFixed(1)}%</span><span class="cell-cnt" style="color:${fgSub(pct)}">(${cnt})</span>`;
      td.title = `${region} | ${scenarios[si].abbr.replace('\n',' ')} | ${typeLabels[ti]}: ${pct}% (n=${cnt})`;
      tr.appendChild(td);
    });

    tbody.appendChild(tr);
  });
});

table.appendChild(tbody);
</script>
</body>
</html>
