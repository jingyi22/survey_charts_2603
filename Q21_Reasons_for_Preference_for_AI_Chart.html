<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Q21 — AI Agent Advantages</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, Helvetica, sans-serif;
    background: #fff;
    padding: 16px;
    min-height: 100vh;
  }

  .wrapper {
    background: #fff;
    width: 100%;
    padding: 14px 18px 10px;
  }

  .meta {
    font-size: 11px;
    color: #6b7280;
    margin-bottom: 12px;
  }

  /* Two-panel layout — freely resizable */
  .panels {
    display: flex;
    gap: 0;
    align-items: stretch;
    width: 100%;
    height: calc(100vh - 110px);
    min-height: 260px;
  }

  /* LEFT: overall */
  .panel-overall {
    flex: 0 0 28%;
    min-width: 180px;
    max-width: 320px;
    display: flex;
    flex-direction: column;
    padding-right: 16px;
    border-right: 1px solid #e5e7eb;
  }

  /* RIGHT: by region */
  .panel-region {
    flex: 1 1 auto;
    min-width: 0;
    display: flex;
    flex-direction: column;
    padding-left: 20px;
  }

  .panel-title {
    font-size: 12px;
    font-weight: 700;
    color: #1f2937;
    margin-bottom: 1px;
    flex-shrink: 0;
  }

  .panel-subtitle {
    font-size: 9.5px;
    color: #9ca3af;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  /* Canvas containers fill remaining height */
  .chart-box {
    flex: 1 1 auto;
    position: relative;
    min-height: 0;
  }
</style>
</head>
<body>

<div class="wrapper">
  <div class="meta">Multiple choice, max. 3 &nbsp;·&nbsp; n = 1,076 total &nbsp;·&nbsp; 6 regions: GB, HK, SG, JP, KR, TH</div>

  <div class="panels">
    <!-- Overall -->
    <div class="panel-overall">
      <div class="panel-title">Overall (Q21)</div>
      <div class="panel-subtitle">% of all respondents · n = 1,076</div>
      <div class="chart-box">
        <canvas id="overallChart"></canvas>
      </div>
    </div>

    <!-- By Region -->
    <div class="panel-region">
      <div class="panel-title">By Region (Q21)</div>
      <div class="panel-subtitle">% of regional respondents (count ÷ region n)</div>
      <div class="chart-box">
        <canvas id="regionChart"></canvas>
      </div>
    </div>
  </div>
</div>

<script>
/* ── Palette ─────────────────────────────────────────────── */
const C = ['#FFC107','#FF8C00','#E84545','#9B59B6','#4472C4','#27AE60'];

/* ── Labels ──────────────────────────────────────────────── */
const CATS = [
  'Fast response—no waiting',
  'Available 24/7',
  'Efficient for simple issues',
  'No need for social interaction—less hassle',
  'Can pause and continue conversation later',
  'Other',
];

/* ── Data ────────────────────────────────────────────────── */
const overallVals = [35.8, 35.0, 29.4, 7.2, 6.6, 0.5];

const REGIONS = ['GB','HK','SG','JP','KR','TH'];
// rows = categories, cols = regions
const byRegion = [
  [40.0, 24.9, 30.0, 44.5, 31.7, 58.2], // Fast response
  [36.4, 34.6, 33.9, 44.1, 30.3, 55.2], // Available 24/7
  [32.1, 17.8, 30.0, 38.8, 33.8, 26.9], // Efficient
  [ 7.9,  6.2, 11.0,  3.0,  7.6, 16.4], // Social
  [ 9.3,  7.1,  9.0,  2.5,  3.0, 11.9], // Pause
  [ 0.5,  0.5,  0.5,  0.5,  0.5,  0.5], // Other
];

/* ── Plugin: draw data labels on bars ───────────────────── */
const labelPlugin = {
  id: 'barLabels',
  afterDatasetsDraw(chart) {
    const ctx = chart.ctx;
    const isHoriz = chart.config.options.indexAxis === 'y';
    chart.data.datasets.forEach((ds, di) => {
      const meta = chart.getDatasetMeta(di);
      if (meta.hidden) return;
      meta.data.forEach((bar, bi) => {
        const val = ds.data[bi];
        if (val < 1.5) return;
        ctx.save();
        if (isHoriz) {
          ctx.font = 'bold 13px Arial';
          ctx.fillStyle = '#374151';
          ctx.textAlign = 'left';
          ctx.textBaseline = 'middle';
          ctx.fillText(val + '%', bar.x + 5, bar.y);
        } else {
          ctx.font = 'bold 12px Arial';
          ctx.fillStyle = '#374151';
          ctx.textAlign = 'center';
          ctx.textBaseline = 'bottom';
          ctx.fillText(val + '%', bar.x, bar.y - 3);
        }
        ctx.restore();
      });
    });
  }
};
Chart.register(labelPlugin);

/* ── Overall Chart (horizontal bar) ─────────────────────── */
new Chart(document.getElementById('overallChart'), {
  type: 'bar',
  data: {
    labels: CATS,
    datasets: [{
      data: overallVals,
      backgroundColor: C,
      borderWidth: 0,
      borderRadius: 2,
    }]
  },
  options: {
    indexAxis: 'y',
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: { display: false },
      tooltip: { callbacks: { label: c => ' ' + c.raw + '%' } }
    },
    scales: {
      x: {
        min: 0, max: 44,
        grid: { color: '#f3f4f6' },
        ticks: {
          font: { size: 12 },
          callback: v => v + '%',
          maxTicksLimit: 5,
        },
        border: { display: false },
      },
      y: {
        grid: { display: false },
        afterFit(scale) { scale.width = Math.max(scale.width, 148); },
        ticks: {
          font: { size: 12 },
          color: '#374151',
          callback(val, idx) {
            const l = CATS[idx];
            if (l.length <= 20) return l;
            // Split near the middle at a word boundary
            const mid = Math.floor(l.length / 2);
            const after  = l.indexOf(' ', mid);
            const before = l.lastIndexOf(' ', mid);
            const split  = (after !== -1 && after - mid < mid - before) ? after : before;
            return split > 0 ? [l.slice(0, split), l.slice(split + 1)] : l;
          }
        },
        border: { display: false },
      }
    },
    layout: { padding: { left: 4, right: 32 } },
  }
});

/* ── Region Chart (grouped bar) ─────────────────────────── */
new Chart(document.getElementById('regionChart'), {
  type: 'bar',
  data: {
    labels: REGIONS,
    datasets: CATS.map((cat, i) => ({
      label: cat,
      data: byRegion[i],
      backgroundColor: C[i],
      borderWidth: 0,
      borderRadius: 2,
    }))
  },
  options: {
    responsive: true,
    maintainAspectRatio: false,
    plugins: {
      legend: {
        display: true,
        position: 'bottom',
        labels: {
          boxWidth: 12,
          boxHeight: 10,
          font: { size: 13 },
          color: '#374151',
          padding: 10,
        }
      },
      tooltip: { callbacks: { label: c => ' ' + c.dataset.label + ': ' + c.raw + '%' } }
    },
    scales: {
      x: {
        grid: { display: false },
        ticks: { font: { size: 11, weight: '700' }, color: '#374151' },
        border: { display: false },
      },
      y: {
        min: 0, max: 65,
        grid: { color: '#f3f4f6' },
        ticks: {
          font: { size: 9 },
          callback: v => v + '%',
          maxTicksLimit: 7,
        },
        border: { display: false },
      }
    },
  }
});
</script>
</body>
</html>
